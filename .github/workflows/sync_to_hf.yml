name: Sync to Hugging Face hub
on:
  push:
    branches: [main, master]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Pushes whatever branch triggered the workflow to the `main` branch of the Hugging Face Space
        run: git push --force https://mayankanand25:$HF_TOKEN@huggingface.co/spaces/mayankanand25/AI-Fake-Article-Detector HEAD:main
